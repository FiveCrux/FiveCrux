<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveCrux — Giveaways</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      colors: { brand: { orange: '#f97316', yellow: '#facc15' } }
    }
  }
}
</script>
<style>
  body{font-family:'Inter',sans-serif;background:#0a0a0a}
  .glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(12px)}
  .glass-strong{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);backdrop-filter:blur(16px)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:#0a0a0a}
  ::-webkit-scrollbar-thumb{background:#27272a;border-radius:8px;border:2px solid #0a0a0a}
  ::-webkit-scrollbar-thumb:hover{background:#3f3f46}
  .placeholder{
    background:linear-gradient(135deg, rgba(249,115,22,0.30), rgba(250,204,21,0.12) 55%, rgba(255,255,255,0.04));
    position:relative;overflow:hidden;
  }
  .placeholder span{font-weight:900;letter-spacing:-0.02em;color:rgba(255,255,255,0.16);text-transform:uppercase}
  .placeholder-sm{background:linear-gradient(135deg, rgba(249,115,22,0.22), rgba(255,255,255,0.04));}
  .yel-badge{background:rgba(250,204,21,0.14);border:1px solid rgba(250,204,21,0.35);color:#facc15}
  .row{transition:all .2s ease;border:1px solid rgba(255,255,255,0.06)}
  .row:hover{border-color:rgba(249,115,22,0.3);background:rgba(255,255,255,0.04)}
  .row.active{border-color:rgba(249,115,22,0.6);background:rgba(249,115,22,0.08);box-shadow:0 0 0 1px rgba(249,115,22,0.3)}
  .feat-glow{box-shadow:0 0 0 1px rgba(249,115,22,0.25),0 20px 60px rgba(0,0,0,0.6)}
  .req-done i{color:#facc15}
</style>
</head>
<body class="text-white antialiased">

<!-- ===== NAVBAR ===== -->
<div class="sticky top-0 z-50 px-4 pt-4">
  <nav class="glass-strong max-w-[100rem] mx-auto rounded-2xl px-5 py-3 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <a href="#" class="text-2xl font-black tracking-tight"><span class="text-brand-orange">Five</span><span class="text-brand-yellow">Crux</span></a>
      <div class="hidden lg:flex items-center gap-6 text-sm font-medium text-zinc-300">
        <a href="#" class="hover:text-white transition">Home</a>
        <a href="#" class="hover:text-white transition">Scripts</a>
        <a href="#" class="hover:text-white transition">Props</a>
        <a href="#" class="text-white">Giveaways</a>
        <a href="#" class="hover:text-white transition">Advertise</a>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button class="relative p-2 rounded-xl glass hover:bg-white/10 transition">
        <i data-lucide="gift" class="w-5 h-5"></i>
        <span class="absolute -top-1 -right-1 bg-brand-orange text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">6</span>
      </button>
      <button class="glass hover:bg-white/10 text-sm font-medium px-4 py-2 rounded-xl transition">Login</button>
    </div>
  </nav>
</div>

<!-- ===== TITLE STRIP ===== -->
<div class="max-w-[100rem] mx-auto px-4 pt-8 pb-4">
  <div class="inline-flex items-center gap-2 glass rounded-full px-4 py-1.5 text-xs font-semibold text-brand-orange mb-4">
    <i data-lucide="layout-panel-left" class="w-3.5 h-3.5"></i> CONCEPT 08 — SPLIT STICKY
  </div>
  <div class="flex items-end justify-between gap-4">
    <h1 class="text-3xl md:text-5xl font-black tracking-tight">Live <span class="text-brand-orange">Giveaways</span></h1>
    <div class="hidden sm:flex items-center gap-2 text-sm text-zinc-400"><i data-lucide="users" class="w-4 h-4 text-brand-yellow"></i> 11,920 entries today</div>
  </div>
</div>

<!-- ===== SPLIT LAYOUT ===== -->
<main class="max-w-[100rem] mx-auto px-4 pb-16">
  <div class="grid grid-cols-1 lg:grid-cols-[1.3fr_1fr] gap-6">

    <!-- LEFT: sticky featured -->
    <div class="lg:sticky lg:top-24 lg:self-start">
      <div id="featured" class="glass rounded-3xl overflow-hidden feat-glow"></div>
    </div>

    <!-- RIGHT: scrollable list -->
    <div>
      <div class="flex items-center justify-between mb-3 px-1">
        <h2 class="text-sm font-semibold uppercase tracking-widest text-zinc-400">All draws</h2>
        <span class="text-xs text-zinc-500">Tap a row to preview</span>
      </div>
      <div id="list" class="space-y-3"></div>
    </div>

  </div>
</main>

<footer class="border-t border-white/5">
  <div class="max-w-[100rem] mx-auto px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm text-zinc-500">
    <div class="text-xl font-black"><span class="text-brand-orange">Five</span><span class="text-brand-yellow">Crux</span></div>
    <p>Winners notified by email and Discord. Provably-fair draws.</p>
  </div>
</footer>

<script>
const giveaways = [
  { name:"Premium Scripts Mega Bundle", value:"$1,200", entries:"5,100", time:"1d 3h", host:"CruxDev",
    reqs:[["Log in to FiveCrux",true],["Join the Discord server",true],["Follow the host @CruxDev",false]] },
  { name:"Full Server Starter Pack", value:"$600", entries:"3,400", time:"18h", host:"FiveCrux",
    reqs:[["Log in to FiveCrux",true],["Verify your email",false],["Join the Discord server",false]] },
  { name:"Casino Heist Script Bundle", value:"$450", entries:"1,240", time:"2d 14h", host:"HighRoller",
    reqs:[["Log in to FiveCrux",true],["Join the Discord server",false],["Retweet the launch post",false]] },
  { name:"Police MDT + Dispatch", value:"$25", entries:"760", time:"3d 9h", host:"NightShift",
    reqs:[["Log in to FiveCrux",true],["Follow the host @NightShift",false]] },
  { name:"Luxury Apartments MLO", value:"$35", entries:"880", time:"4d 6h", host:"MapMasters",
    reqs:[["Log in to FiveCrux",true],["Join the Discord server",false]] },
  { name:"Drift Car Pack (15)", value:"$15", entries:"540", time:"6d", host:"RevHead",
    reqs:[["Log in to FiveCrux",true],["Follow the host @RevHead",false]] },
];

function renderFeatured(g){
  const reqs = g.reqs.map(([label,done]) => `
    <li class="flex items-center gap-3 py-2 ${done ? 'req-done' : ''}">
      <span class="w-6 h-6 rounded-full flex items-center justify-center ${done ? 'bg-brand-yellow/15 border border-brand-yellow/40' : 'glass'}">
        <i data-lucide="${done ? 'check' : 'circle'}" class="w-3.5 h-3.5 ${done ? '' : 'text-zinc-500'}"></i>
      </span>
      <span class="text-sm ${done ? 'text-white' : 'text-zinc-400'}">${label}</span>
    </li>`).join('');

  document.getElementById('featured').innerHTML = `
    <div class="placeholder h-64 md:h-80 flex items-center justify-center px-8 text-center">
      <span class="text-2xl md:text-3xl">${g.name}</span>
      <span class="absolute top-4 left-4 text-[10px] font-bold text-brand-orange bg-black/40 backdrop-blur rounded-full px-3 py-1 uppercase tracking-widest">Featured draw</span>
    </div>
    <div class="p-6 md:p-8">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h3 class="text-2xl md:text-3xl font-black tracking-tight leading-tight">${g.name}</h3>
          <div class="flex items-center gap-2 text-sm text-zinc-400 mt-2"><i data-lucide="gift" class="w-4 h-4"></i> Hosted by @${g.host}</div>
        </div>
        <span class="yel-badge shrink-0 text-sm font-bold rounded-xl px-3 py-1.5">${g.value} value</span>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-6">
        <div class="glass rounded-2xl px-4 py-3">
          <div class="flex items-center gap-2 text-brand-yellow text-xs font-semibold uppercase tracking-wide"><i data-lucide="clock" class="w-4 h-4"></i> Ends in</div>
          <div class="text-2xl font-black mt-1">${g.time}</div>
        </div>
        <div class="glass rounded-2xl px-4 py-3">
          <div class="flex items-center gap-2 text-zinc-300 text-xs font-semibold uppercase tracking-wide"><i data-lucide="users" class="w-4 h-4"></i> Entries</div>
          <div class="text-2xl font-black mt-1">${g.entries}</div>
        </div>
      </div>

      <div class="mt-6">
        <div class="text-xs font-semibold uppercase tracking-widest text-zinc-400 mb-1">Requirements</div>
        <ul>${reqs}</ul>
      </div>

      <button class="w-full mt-5 flex items-center justify-center gap-2 bg-brand-orange hover:bg-orange-500 text-black font-bold text-base px-5 py-4 rounded-2xl transition">
        Enter giveaway <i data-lucide="arrow-right" class="w-5 h-5"></i>
      </button>
      <p class="text-center text-xs text-zinc-500 mt-3">Free entry · One per account · Winner drawn automatically</p>
    </div>`;
  lucide.createIcons();
}

function renderList(){
  document.getElementById('list').innerHTML = giveaways.map((g,i) => `
    <button data-i="${i}" class="row ${i===0?'active':''} w-full text-left rounded-2xl p-3 flex items-center gap-4">
      <div class="placeholder placeholder-sm w-20 h-20 rounded-xl shrink-0 flex items-center justify-center text-center px-1">
        <span class="text-[9px] leading-tight">${g.name}</span>
      </div>
      <div class="flex-1 min-w-0">
        <h4 class="font-bold text-sm truncate">${g.name}</h4>
        <div class="flex items-center gap-3 mt-1.5 text-xs text-zinc-400">
          <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5 text-brand-yellow"></i>${g.time}</span>
          <span class="flex items-center gap-1"><i data-lucide="users" class="w-3.5 h-3.5"></i>${g.entries}</span>
        </div>
        <div class="flex items-center gap-2 mt-1.5">
          <span class="yel-badge text-[11px] font-bold rounded-md px-1.5 py-0.5">${g.value}</span>
          <span class="text-[11px] text-zinc-500">@${g.host}</span>
        </div>
      </div>
      <i data-lucide="chevron-right" class="w-5 h-5 text-zinc-600 shrink-0"></i>
    </button>
  `).join('');

  document.querySelectorAll('#list .row').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#list .row').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFeatured(giveaways[+btn.dataset.i]);
      if(window.innerWidth < 1024) window.scrollTo({top:0, behavior:'smooth'});
    });
  });
  lucide.createIcons();
}

renderFeatured(giveaways[0]);
renderList();
lucide.createIcons();
</script>
</body>
</html>
