<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiveCrux — Product Card (reference style)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{brand:{orange:"#f97316"}}}}}</script>
<style>
  body{font-family:Inter,sans-serif;background:#0a0a0a;color:#fff}
  .card{transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}
  .card:hover{transform:translateY(-5px);border-color:rgba(249,115,22,.4);box-shadow:0 16px 40px rgba(0,0,0,.5)}
  .v-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  .chip{font-size:10px;font-weight:700}
</style>
</head>
<body class="px-6 py-10">
<div class="mx-auto max-w-6xl">
  <h1 class="text-3xl font-extrabold">Product Card <span class="text-brand-orange">— reference style</span></h1>
  <p class="mt-1 text-white/50">Approved giveaway-card style ko products pe apply kiya — 2 micro-variants. Number batao.</p>

  <!-- ===== Variant 1: View (browse grid) ===== -->
  <div class="mt-10 mb-3 flex items-center gap-3"><span class="v-label rounded-full bg-brand-orange/15 px-3 py-1 text-brand-orange">Variant 1 — Browse (View)</span><span class="text-sm text-white/45">price + "View →" footer · scripts/marketplace grid ke liye</span></div>
  <div id="grid1" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4"></div>

  <!-- ===== Variant 2: Add to Cart (buy) ===== -->
  <div class="mt-14 mb-3 flex items-center gap-3"><span class="v-label rounded-full bg-brand-orange/15 px-3 py-1 text-brand-orange">Variant 2 — Buy (Add to Cart)</span><span class="text-sm text-white/45">price + full Add-to-Cart button · conversion ke liye</span></div>
  <div id="grid2" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4"></div>
</div>

<script>
  const items = [
    { title:"Advanced Banking System", fw:["ESX","QBCore"], price:19.99, was:30, rating:4.9, seller:"CruxDev", tag:"FEATURED", img:"https://img.forgemods.de/images/thumb/images/4f205008-65c0-4591-9561-33c232a2bc20_gta5map_ls_legion_square_park_bed357ad-959c-4e1e-9420-c793a2ad905f.webp" },
    { title:"Inventory HUD Reloaded", fw:["ESX"], price:0, rating:4.7, seller:"PixelForge", tag:"FREE", img:"https://img.forgemods.de/images/thumb/images/gta5map_gaming_e83b6804-9d4f-4a0c-bb8f-ed72882d7d9b.webp" },
    { title:"Police MDT & Dispatch", fw:["QBCore"], price:24.99, rating:5.0, seller:"NightShift", img:"https://img.forgemods.de/images/thumb/images/c56a6a29-9469-4875-8557-679884d124a6_gta5map_los_santos_medical_center_cd5cc62b-caf0-4021-bdf0-debb98f190fe.webp" },
    { title:"Luxury Apartments MLO", fw:["Standalone"], price:34.99, rating:4.8, seller:"MapMasters", img:"https://img.forgemods.de/images/thumb/images/gta5map_vinewood_lake_villa_03_33f120b6-d81c-4c10-973d-c4522420e975.webp" },
  ];
  const price = p => p.price === 0
    ? `<span class="text-base font-extrabold text-green-400">Free</span>`
    : `${p.was?`<span class="mr-1 text-xs text-white/40 line-through">$${p.was.toFixed(2)}</span>`:""}<span class="text-base font-extrabold text-white">$${p.price.toFixed(2)}</span>`;
  const fw = p => p.fw.map(f=>`<span class="chip rounded bg-white/10 px-1.5 py-0.5 uppercase">${f}</span>`).join("");
  const tag = p => p.tag==="FEATURED"
    ? `<span class="chip absolute left-3 top-3 rounded-md bg-brand-orange px-2 py-1 text-black">FEATURED</span>`
    : p.tag==="FREE" ? `<span class="chip absolute left-3 top-3 rounded-md bg-green-500 px-2 py-1 text-black">FREE</span>` : "";
  const head = p => `
    <div class="relative h-44">
      <img src="${p.img}" class="h-full w-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
      ${tag(p)}
      <span class="chip absolute right-3 top-3 flex items-center gap-1 rounded-md bg-black/55 px-2 py-1 backdrop-blur-sm"><i data-lucide="star" class="h-3 w-3 fill-yellow-400 text-yellow-400"></i> ${p.rating.toFixed(1)}</span>
    </div>`;
  const seller = p => `
    <div class="mt-2 flex items-center gap-2 text-sm text-white/50">
      <span class="grid h-5 w-5 place-items-center rounded-full bg-white/10 text-[10px] font-bold">${p.seller.charAt(0)}</span>${p.seller}
    </div>`;

  // Variant 1 — browse / View
  document.getElementById("grid1").innerHTML = items.map(p=>`
    <div class="card overflow-hidden rounded-2xl border border-white/[0.08] bg-white/[0.03]">
      ${head(p)}
      <div class="p-5">
        <div class="mb-2 flex gap-1.5">${fw(p)}</div>
        <h3 class="text-base font-bold leading-snug">${p.title}</h3>
        ${seller(p)}
        <div class="mt-4 flex items-center justify-between border-t border-white/[0.06] pt-4">
          <div>${price(p)}</div>
          <span class="flex items-center gap-1 text-sm font-semibold text-brand-orange">View <i data-lucide="chevron-right" class="h-4 w-4"></i></span>
        </div>
      </div>
    </div>`).join("");

  // Variant 2 — buy / Add to Cart
  document.getElementById("grid2").innerHTML = items.map(p=>`
    <div class="card overflow-hidden rounded-2xl border border-white/[0.08] bg-white/[0.03]">
      ${head(p)}
      <div class="p-5">
        <div class="mb-2 flex gap-1.5">${fw(p)}</div>
        <h3 class="text-base font-bold leading-snug">${p.title}</h3>
        ${seller(p)}
        <div class="mt-4 flex items-center justify-between border-t border-white/[0.06] pt-4">${price(p)}</div>
        <button class="btn mt-3 w-full rounded-xl bg-brand-orange py-2.5 text-sm font-semibold text-black hover:bg-orange-400">${p.price===0?"Download":"Add to Cart"}</button>
      </div>
    </div>`).join("");

  lucide.createIcons();
</script>
</body>
</html>
