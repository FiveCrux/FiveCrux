<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiveCrux — Giveaways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { orange: '#f97316' } },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    body { font-family: Inter, sans-serif; background: #0a0a0a; color: #fff; }
  </style>
</head>
<body class="antialiased">

  <!-- Nav -->
  <nav class="sticky top-0 z-50 border-b border-white/[0.08] bg-[#0a0a0a]/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <a href="#" class="text-lg font-semibold tracking-tight">
        <span class="text-brand-orange">Five</span><span class="text-white">Crux</span>
      </a>
      <div class="hidden items-center gap-8 text-sm text-white/60 md:flex">
        <a href="#" class="transition hover:text-white">Home</a>
        <a href="#" class="transition hover:text-white">Scripts</a>
        <a href="#" class="transition hover:text-white">Props</a>
        <a href="#" class="text-white">Giveaways</a>
        <a href="#" class="transition hover:text-white">Advertise</a>
      </div>
      <button class="rounded-lg border border-white/[0.12] px-4 py-1.5 text-sm font-medium text-white/80 transition hover:bg-white/[0.04] hover:text-white">
        Login
      </button>
    </div>
  </nav>

  <main class="mx-auto max-w-4xl px-6 py-12 md:py-16">

    <!-- Variant chip -->
    <div class="mb-8 inline-flex items-center gap-2 rounded-full border border-white/[0.08] bg-white/[0.03] px-3 py-1 text-xs text-white/50">
      <span class="h-1.5 w-1.5 rounded-full bg-brand-orange"></span>
      Variant C — Simple List
    </div>

    <!-- Heading -->
    <header class="mb-10">
      <h1 class="text-3xl font-semibold tracking-tight md:text-4xl">Giveaways</h1>
      <p class="mt-2 text-sm text-white/50">Enter to win scripts, MLOs, and server packs from the FiveCrux community.</p>
    </header>

    <!-- List -->
    <div class="overflow-hidden rounded-2xl border border-white/[0.08] bg-white/[0.03]">
      <div id="list" class="divide-y divide-white/[0.08]"></div>
    </div>

  </main>

  <footer class="border-t border-white/[0.08] py-8">
    <div class="mx-auto max-w-4xl px-6 text-sm text-white/40">
      © 2026 FiveCrux. All rights reserved.
    </div>
  </footer>

  <script>
    const giveaways = [
      { title: 'Casino Heist Script Bundle', value: '$450', entries: '1,240', ends: '2d 14h', host: 'HighRoller' },
      { title: 'Luxury Apartments MLO', value: '$35', entries: '880', ends: '4d 6h', host: 'MapMasters' },
      { title: 'Full Server Starter Pack', value: '$600', entries: '3,400', ends: '18h', host: 'FiveCrux' },
      { title: 'Drift Car Pack (15)', value: '$15', entries: '540', ends: '6d', host: 'RevHead' },
      { title: 'Police MDT + Dispatch', value: '$25', entries: '760', ends: '3d 9h', host: 'NightShift' },
      { title: 'Premium Scripts Mega Bundle', value: '$1,200', entries: '5,100', ends: '1d 3h', host: 'CruxDev' },
    ];

    const row = (g) => `
      <div class="flex flex-col gap-4 p-5 transition hover:bg-white/[0.02] sm:flex-row sm:items-center sm:gap-5">
        <div class="flex h-16 w-16 flex-shrink-0 items-center justify-center rounded-xl bg-white/[0.04]">
          <i data-lucide="gift" class="h-6 w-6 text-white/25"></i>
        </div>
        <div class="min-w-0 flex-1">
          <h3 class="truncate text-base font-semibold">${g.title}</h3>
          <div class="mt-1.5 flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-white/50">
            <span class="text-white/80">${g.value} value</span>
            <span class="inline-flex items-center gap-1.5"><i data-lucide="users" class="h-3.5 w-3.5"></i>${g.entries} entries</span>
            <span class="inline-flex items-center gap-1.5"><i data-lucide="clock" class="h-3.5 w-3.5"></i>Ends in ${g.ends}</span>
            <span>by ${g.host}</span>
          </div>
        </div>
        <button class="inline-flex flex-shrink-0 items-center justify-center gap-2 rounded-xl bg-brand-orange px-4 py-2.5 text-sm font-medium text-white transition hover:bg-brand-orange/90">
          Enter Giveaway <i data-lucide="arrow-right" class="h-4 w-4"></i>
        </button>
      </div>`;

    document.getElementById('list').innerHTML = giveaways.map(row).join('');
    lucide.createIcons();
  </script>
</body>
</html>
