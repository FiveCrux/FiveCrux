<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiveCrux — Entry Card · Social / Community</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{brand:{orange:"#f97316"}}}}}</script>
<style>
  body{font-family:Inter,sans-serif;background:#070707;color:#fff}
  .num{font-variant-numeric:tabular-nums}
  @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.78)}}
  .live-dot{animation:livepulse 1.6s ease-in-out infinite}
  @keyframes livering{0%{transform:scale(1);opacity:.55}80%,100%{transform:scale(2.6);opacity:0}}
  .live-ring{animation:livering 1.6s ease-out infinite}
</style>
</head>
<body class="grid min-h-screen place-items-center px-6 py-12">

<div class="w-full max-w-[390px]">
  <!-- SOCIAL / COMMUNITY: proof-led, warm, alive -->
  <div class="overflow-hidden rounded-[26px] border border-white/[0.07] bg-[#0e0e0e] shadow-[0_24px_60px_-20px_rgba(0,0,0,0.85)]">

    <!-- Prize hero -->
    <div class="relative h-40">
      <img src="https://img.forgemods.de/images/thumb/images/4f205008-65c0-4591-9561-33c232a2bc20_gta5map_ls_legion_square_park_bed357ad-959c-4e1e-9420-c793a2ad905f.webp" class="h-full w-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-[#0e0e0e] via-[#0e0e0e]/25 to-transparent"></div>
      <span class="absolute left-4 top-4 rounded-full bg-black/45 px-2.5 py-1 text-[11px] font-semibold tracking-wide text-white/85 backdrop-blur-md ring-1 ring-white/10">FiveM · MLO</span>
      <!-- live cue, top-right -->
      <span class="absolute right-4 top-4 inline-flex items-center gap-1.5 rounded-full bg-black/45 px-2.5 py-1 text-[11px] font-semibold text-white/80 backdrop-blur-md ring-1 ring-white/10">
        <span class="relative grid place-items-center">
          <span class="live-ring absolute h-2 w-2 rounded-full bg-emerald-400"></span>
          <span class="live-dot h-2 w-2 rounded-full bg-emerald-400"></span>
        </span>
        Live
      </span>
      <div class="absolute inset-x-4 bottom-3">
        <div class="text-[11px] font-medium uppercase tracking-[0.18em] text-orange-400/90">You could win</div>
        <h1 class="mt-0.5 text-xl font-extrabold leading-tight tracking-tight drop-shadow">LS Legion Square Park</h1>
      </div>
    </div>

    <div class="px-6 pb-6 pt-5">
      <!-- HERO SOCIAL ROW: overlapping avatars + Join N players -->
      <div class="flex items-center gap-3.5 rounded-2xl bg-white/[0.03] p-3 ring-1 ring-white/[0.06]">
        <div class="flex -space-x-2.5">
          <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-orange-500 to-amber-400 text-[12px] font-bold text-black ring-2 ring-[#0e0e0e]">JD</span>
          <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-sky-500 to-cyan-400 text-[12px] font-bold text-black ring-2 ring-[#0e0e0e]">RK</span>
          <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-400 text-[12px] font-bold text-black ring-2 ring-[#0e0e0e]">MA</span>
          <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-rose-500 to-pink-400 text-[12px] font-bold text-black ring-2 ring-[#0e0e0e]">SL</span>
          <span class="num grid h-9 w-9 place-items-center rounded-full bg-white/10 text-[11px] font-bold text-white/80 ring-2 ring-[#0e0e0e]">+1.2k</span>
        </div>
        <div class="leading-tight">
          <div class="num text-[15px] font-bold tracking-tight">Join <span class="text-brand-orange">1,277</span> players</div>
          <div class="text-[12px] text-white/45">already in the draw</div>
        </div>
      </div>

      <!-- live activity line -->
      <div class="mt-3 flex items-center gap-2 px-1 text-[12px] text-white/50">
        <span class="relative grid place-items-center">
          <span class="live-ring absolute h-1.5 w-1.5 rounded-full bg-brand-orange"></span>
          <span class="live-dot h-1.5 w-1.5 rounded-full bg-brand-orange"></span>
        </span>
        <span class="num"><span class="font-semibold text-white/75">12 entered</span> in the last hour</span>
      </div>

      <!-- supporting info: worth + countdown, side by side -->
      <div class="mt-4 grid grid-cols-2 gap-3">
        <div class="rounded-2xl bg-white/[0.03] px-4 py-3 ring-1 ring-white/[0.05]">
          <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-white/40">Prize worth</div>
          <div class="num mt-1 text-[20px] font-extrabold leading-none tracking-tight">$19.99</div>
        </div>
        <div class="rounded-2xl bg-white/[0.03] px-4 py-3 ring-1 ring-white/[0.05]">
          <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-white/40">Ends in</div>
          <div class="num mt-1 text-[20px] font-extrabold leading-none tracking-tight">4d 23h 33m</div>
        </div>
      </div>

      <!-- CTA -->
      <button class="group mt-5 flex w-full items-center justify-center gap-2 rounded-2xl bg-brand-orange py-3.5 text-[15px] font-bold text-black transition hover:bg-orange-400">
        Enter Giveaway — it's free
        <i data-lucide="arrow-right" class="h-4 w-4 transition-transform group-hover:translate-x-0.5"></i>
      </button>
      <p class="mt-2.5 flex items-center justify-center gap-1.5 text-[12px] text-white/40">
        <i data-lucide="shield-check" class="h-3.5 w-3.5"></i> Winner drawn automatically &amp; fairly · you haven't entered yet
      </p>
    </div>

    <!-- host footer -->
    <div class="flex items-center gap-3 border-t border-white/[0.06] bg-white/[0.015] px-6 py-4">
      <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-orange-500 to-amber-400 text-sm font-black text-black">F</span>
      <div class="leading-tight">
        <div class="flex items-center gap-1 text-sm font-semibold">Forge Studios <i data-lucide="badge-check" class="h-3.5 w-3.5 text-brand-orange"></i></div>
        <div class="text-xs text-white/40">Giveaway host</div>
      </div>
      <button class="ml-auto text-xs font-semibold text-white/55 transition hover:text-white">View →</button>
    </div>
  </div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
