<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiveCrux — Editorial Poster</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{brand:{orange:"#f97316"}}}}}</script>
<style>
  body{font-family:Inter,sans-serif;background:#070707;color:#fff}
  .num{font-variant-numeric:tabular-nums}
</style>
</head>
<body class="grid min-h-screen place-items-center px-6 py-12">

<div class="w-full max-w-[390px]">
  <div class="overflow-hidden rounded-[28px] border border-white/[0.07] bg-[#0c0c0c] shadow-[0_30px_70px_-24px_rgba(0,0,0,0.85)]">

    <div class="px-8 pt-8">
      <!-- masthead line -->
      <div class="flex items-center justify-between text-[10px] font-semibold uppercase tracking-[0.24em] text-white/35">
        <span>FiveM · MLO</span>
        <span class="flex items-center gap-1.5 text-emerald-400"><span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span> Free entry</span>
      </div>
      <div class="mt-5 h-px w-full bg-white/[0.08]"></div>

      <!-- oversized poster headline -->
      <div class="mt-6">
        <div class="text-[10px] font-semibold uppercase tracking-[0.3em] text-orange-400/90">You could win</div>
        <h1 class="mt-2 text-[42px] font-black leading-[0.95] tracking-tight">
          LS Legion<br/>Square <span class="text-orange-500">Park</span>
        </h1>
      </div>

      <!-- price tag -->
      <div class="mt-7 flex items-end justify-between">
        <div>
          <div class="text-[10px] font-semibold uppercase tracking-[0.2em] text-white/35">Prize worth</div>
          <div class="num mt-1 flex items-baseline gap-1">
            <span class="text-base font-bold text-white/45">$</span>
            <span class="text-[40px] font-black leading-none tracking-tighter">19</span>
            <span class="text-base font-bold text-white/45">.99</span>
          </div>
        </div>
        <!-- prize image, framed small like an editorial plate -->
        <span class="h-16 w-24 shrink-0 overflow-hidden rounded-lg ring-1 ring-white/10">
          <img src="https://img.forgemods.de/images/thumb/images/4f205008-65c0-4591-9561-33c232a2bc20_gta5map_ls_legion_square_park_bed357ad-959c-4e1e-9420-c793a2ad905f.webp" class="h-full w-full object-cover" />
        </span>
      </div>

      <div class="mt-7 h-px w-full bg-white/[0.08]"></div>

      <!-- single refined countdown line -->
      <div class="mt-5 flex items-baseline justify-between">
        <span class="text-[11px] font-semibold uppercase tracking-[0.2em] text-white/35">Closes in</span>
        <span class="num text-[15px] font-semibold tracking-tight">
          <span class="text-white">4</span><span class="text-white/40">d</span>
          <span class="ml-1.5 text-white">23</span><span class="text-white/40">h</span>
          <span class="ml-1.5 text-white">33</span><span class="text-white/40">m</span>
        </span>
      </div>
      <div class="mt-1.5 text-right text-[11px] text-white/30">Jun 19 — Jun 24, 2026</div>
    </div>

    <!-- CTA -->
    <div class="px-8 pt-7">
      <button class="group flex w-full items-center justify-center gap-2 rounded-2xl bg-orange-500 py-3.5 font-bold text-black transition hover:bg-orange-400">
        Enter Giveaway
        <i data-lucide="arrow-right" class="h-4 w-4 transition-transform group-hover:translate-x-0.5"></i>
      </button>
      <p class="mt-2.5 text-center text-[12px] text-white/35">Winner drawn automatically &amp; fairly</p>

      <!-- social proof line -->
      <div class="mt-6 flex items-baseline justify-between border-t border-white/[0.06] pt-5">
        <p class="text-[13px] text-white/55"><span class="num font-semibold text-white">1,277</span> entered</p>
        <p class="text-[12px] text-white/35">You haven't yet · <span class="num">0</span> entries</p>
      </div>
    </div>

    <!-- host footer -->
    <div class="mt-5 flex items-center gap-3 border-t border-white/[0.06] bg-white/[0.015] px-8 py-4">
      <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-orange-500 to-amber-400 text-sm font-black text-black">F</span>
      <div class="leading-tight">
        <div class="flex items-center gap-1 text-[13px] font-semibold">Forge Studios <i data-lucide="badge-check" class="h-3.5 w-3.5 text-orange-400"></i></div>
        <div class="text-[11px] text-white/40">Giveaway host</div>
      </div>
      <button class="ml-auto text-[12px] font-semibold text-white/60 transition hover:text-white">View →</button>
    </div>
  </div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
