<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiveCrux — Entry Card · Asymmetric</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{brand:{orange:"#f97316"}}}}}</script>
<style>
  body{font-family:Inter,sans-serif;background:#070707;color:#fff}
  .num{font-variant-numeric:tabular-nums}
</style>
</head>
<body class="grid min-h-screen place-items-center px-6 py-12">

<div class="w-full max-w-[390px]">
  <!-- the card -->
  <div class="relative overflow-hidden rounded-[28px] border border-white/[0.07] bg-[#0d0d0d] shadow-[0_30px_70px_-24px_rgba(0,0,0,0.85)]">

    <!-- ambient orange glow, off to one corner -->
    <div class="pointer-events-none absolute -right-16 -top-20 h-56 w-56 rounded-full bg-orange-600/20 blur-[70px]"></div>

    <!-- top split: tall image strip on the right, content offset left -->
    <div class="relative flex">
      <!-- left column: kicker + big content, breathing negative space -->
      <div class="flex-1 px-6 pt-6 pb-5">
        <div class="text-[10px] font-semibold uppercase tracking-[0.22em] text-orange-400/90">You could win</div>
        <h3 class="mt-2.5 text-[22px] font-extrabold leading-[1.12] tracking-tight">LS Legion<br>Square Park</h3>
        <span class="mt-3 inline-flex items-center gap-1.5 rounded-full bg-white/[0.05] px-2.5 py-1 text-[10.5px] font-semibold tracking-wide text-white/65 ring-1 ring-white/10">
          <i data-lucide="box" class="h-3 w-3 text-orange-400"></i> FiveM · MLO
        </span>
      </div>

      <!-- right: tall art-directed image strip -->
      <div class="relative w-[140px] shrink-0">
        <img src="https://img.forgemods.de/images/thumb/images/4f205008-65c0-4591-9561-33c232a2bc20_gta5map_ls_legion_square_park_bed357ad-959c-4e1e-9420-c793a2ad905f.webp" class="h-full w-full object-cover" />
        <!-- feather the strip into the card on its left edge -->
        <div class="absolute inset-y-0 left-0 w-20 bg-gradient-to-r from-[#0d0d0d] to-transparent"></div>
        <div class="absolute inset-x-0 top-0 h-10 bg-gradient-to-b from-[#0d0d0d]/70 to-transparent"></div>
      </div>
    </div>

    <!-- oversized value, art-directed off-center -->
    <div class="relative px-6">
      <div class="flex items-end gap-4">
        <div class="-mt-1">
          <div class="text-[10px] font-medium uppercase tracking-[0.2em] text-white/40">Prize worth</div>
          <div class="num mt-1 text-[58px] font-black leading-[0.86] tracking-tighter">$19<span class="text-[28px] align-top text-white/55">.99</span></div>
        </div>
        <span class="mb-2 inline-flex items-center gap-1.5 rounded-full bg-emerald-500/12 px-3 py-1.5 text-xs font-bold text-emerald-400 ring-1 ring-emerald-500/25">
          <i data-lucide="ticket" class="h-3.5 w-3.5"></i> Free entry
        </span>
      </div>
    </div>

    <!-- hairline -->
    <div class="mx-6 mt-5 h-px bg-white/[0.07]"></div>

    <!-- countdown — single elegant line, asymmetric label vs big numerals -->
    <div class="px-6 pt-5">
      <div class="flex items-end justify-between">
        <span class="pb-1 text-[10px] font-medium uppercase tracking-[0.2em] text-white/40">Ends in</span>
        <div class="num flex items-baseline gap-1 text-right">
          <span class="text-2xl font-extrabold tracking-tight">4</span><span class="mr-1.5 text-xs font-semibold text-white/45">d</span>
          <span class="text-2xl font-extrabold tracking-tight">23</span><span class="mr-1.5 text-xs font-semibold text-white/45">h</span>
          <span class="text-2xl font-extrabold tracking-tight text-orange-400">33</span><span class="text-xs font-semibold text-white/45">m</span>
        </div>
      </div>
      <div class="mt-3 h-1.5 w-full overflow-hidden rounded-full bg-white/[0.06]">
        <div class="h-full rounded-full bg-gradient-to-r from-orange-500 to-orange-400" style="width:62%"></div>
      </div>
      <div class="mt-1.5 flex justify-between text-[11px] text-white/30">
        <span>Started Jun 19</span><span>Ends Jun 24, 2026</span>
      </div>
    </div>

    <!-- CTA -->
    <div class="px-6 pt-6">
      <button class="group flex w-full items-center justify-center gap-2 rounded-2xl bg-orange-500 py-3.5 font-bold text-black transition hover:bg-orange-400">
        Enter Giveaway
        <i data-lucide="arrow-right" class="h-4 w-4 transition-transform group-hover:translate-x-0.5"></i>
      </button>
      <p class="mt-2.5 flex items-center justify-center gap-1.5 text-[12px] text-white/35">
        <i data-lucide="shield-check" class="h-3.5 w-3.5"></i> Winner drawn automatically &amp; fairly
      </p>
    </div>

    <!-- social proof -->
    <div class="mt-5 flex items-center gap-3 px-6">
      <div class="flex -space-x-2">
        <span class="grid h-7 w-7 place-items-center rounded-full bg-orange-500/80 text-[10px] font-bold text-black ring-2 ring-[#0d0d0d]">A</span>
        <span class="grid h-7 w-7 place-items-center rounded-full bg-sky-500/80 text-[10px] font-bold text-black ring-2 ring-[#0d0d0d]">R</span>
        <span class="grid h-7 w-7 place-items-center rounded-full bg-violet-500/80 text-[10px] font-bold text-black ring-2 ring-[#0d0d0d]">K</span>
        <span class="grid h-7 w-7 place-items-center rounded-full bg-white/10 text-[10px] font-bold ring-2 ring-[#0d0d0d]">+</span>
      </div>
      <p class="text-sm text-white/55"><span class="num font-semibold text-white">1,277</span> entered — <span class="text-white/40">you haven't yet</span></p>
    </div>

    <!-- host footer -->
    <div class="mt-5 flex items-center gap-3 border-t border-white/[0.06] bg-white/[0.015] px-6 py-4">
      <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-orange-500 to-amber-400 text-sm font-black text-black">F</span>
      <div class="leading-tight">
        <div class="flex items-center gap-1 text-sm font-semibold">Forge Studios <i data-lucide="badge-check" class="h-3.5 w-3.5 text-orange-400"></i></div>
        <div class="text-xs text-white/40">Giveaway host</div>
      </div>
      <button class="ml-auto text-xs font-semibold text-white/60 transition hover:text-white">View →</button>
    </div>
  </div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
