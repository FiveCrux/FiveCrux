<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiveCrux — Circular Timer Hero</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{brand:{orange:"#f97316"}}}}}</script>
<style>
  body{font-family:Inter,sans-serif;background:#070707;color:#fff}
  .num{font-variant-numeric:tabular-nums}
</style>
</head>
<body class="grid min-h-screen place-items-center px-6 py-12">

<div class="w-full max-w-[390px]">
  <div class="overflow-hidden rounded-[28px] border border-white/[0.07] bg-[#0d0d0d] shadow-[0_30px_70px_-24px_rgba(0,0,0,0.85)]">

    <!-- top: prize identity -->
    <div class="px-7 pt-7 pb-2">
      <div class="flex items-center gap-3">
        <span class="relative h-12 w-12 shrink-0 overflow-hidden rounded-xl ring-1 ring-white/10">
          <img src="https://img.forgemods.de/images/thumb/images/4f205008-65c0-4591-9561-33c232a2bc20_gta5map_ls_legion_square_park_bed357ad-959c-4e1e-9420-c793a2ad905f.webp" class="h-full w-full object-cover" />
        </span>
        <div class="min-w-0">
          <div class="text-[10px] font-semibold uppercase tracking-[0.22em] text-white/35">FiveM · MLO</div>
          <h1 class="truncate text-[17px] font-extrabold leading-tight tracking-tight">LS Legion Square Park</h1>
        </div>
      </div>

      <div class="mt-5 flex items-center justify-between">
        <div>
          <div class="text-[10px] font-semibold uppercase tracking-[0.2em] text-white/35">Prize worth</div>
          <div class="num mt-0.5 text-2xl font-extrabold tracking-tight">$19.99</div>
        </div>
        <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-500/[0.12] px-3 py-1 text-[12px] font-bold text-emerald-400 ring-1 ring-emerald-500/25">
          <i data-lucide="ticket" class="h-3.5 w-3.5"></i> Free entry
        </span>
      </div>
    </div>

    <!-- circular timer hero -->
    <div class="grid place-items-center px-7 pb-2 pt-7">
      <div class="relative h-[210px] w-[210px]">
        <svg viewBox="0 0 220 220" class="h-full w-full -rotate-90">
          <circle cx="110" cy="110" r="98" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="6" />
          <!-- 62% remaining arc — circumference 2πr ≈ 615.75 -->
          <circle cx="110" cy="110" r="98" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"
                  stroke-dasharray="615.75" stroke-dashoffset="234" />
        </svg>
        <div class="absolute inset-0 grid place-items-center text-center">
          <div>
            <div class="text-[10px] font-semibold uppercase tracking-[0.24em] text-orange-400/90">Ends in</div>
            <div class="num mt-1 text-[68px] font-black leading-none tracking-tighter">4</div>
            <div class="-mt-1 text-[12px] font-medium uppercase tracking-[0.3em] text-white/45">days left</div>
            <div class="num mt-2.5 text-[12px] font-semibold text-white/55">23h 33m</div>
          </div>
        </div>
      </div>
      <div class="mt-4 flex w-full items-center justify-between text-[11px] text-white/30">
        <span>Started Jun 19</span>
        <span class="h-px flex-1 mx-3 bg-white/[0.07]"></span>
        <span>Ends Jun 24, 2026</span>
      </div>
    </div>

    <!-- CTA + trust -->
    <div class="px-7 pt-5">
      <button class="group flex w-full items-center justify-center gap-2 rounded-2xl bg-orange-500 py-3.5 font-bold text-black transition hover:bg-orange-400">
        Enter Giveaway
        <i data-lucide="arrow-right" class="h-4 w-4 transition-transform group-hover:translate-x-0.5"></i>
      </button>
      <p class="mt-2.5 flex items-center justify-center gap-1.5 text-[12px] text-white/35">
        <i data-lucide="shield-check" class="h-3.5 w-3.5"></i> Winner drawn automatically &amp; fairly
      </p>

      <!-- social proof -->
      <div class="mt-5 flex items-center gap-3">
        <div class="flex -space-x-2">
          <span class="grid h-7 w-7 place-items-center rounded-full bg-orange-500/80 text-[10px] font-bold text-black ring-2 ring-[#0d0d0d]">A</span>
          <span class="grid h-7 w-7 place-items-center rounded-full bg-sky-500/80 text-[10px] font-bold text-black ring-2 ring-[#0d0d0d]">R</span>
          <span class="grid h-7 w-7 place-items-center rounded-full bg-violet-500/80 text-[10px] font-bold text-black ring-2 ring-[#0d0d0d]">K</span>
        </div>
        <p class="text-[13px] text-white/55"><span class="num font-semibold text-white">1,277</span> entered — <span class="text-white/40">you haven't yet</span></p>
      </div>
    </div>

    <!-- host footer -->
    <div class="mt-6 flex items-center gap-3 border-t border-white/[0.06] bg-white/[0.015] px-7 py-4">
      <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-orange-500 to-amber-400 text-sm font-black text-black">F</span>
      <div class="leading-tight">
        <div class="flex items-center gap-1 text-[13px] font-semibold">Forge Studios <i data-lucide="badge-check" class="h-3.5 w-3.5 text-orange-400"></i></div>
        <div class="text-[11px] text-white/40">Giveaway host</div>
      </div>
      <button class="ml-auto text-[12px] font-semibold text-white/60 transition hover:text-white">View →</button>
    </div>
  </div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
