<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiveCrux — Entry Card · Swiss Minimal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{brand:{orange:"#f97316"}}}}}</script>
<style>
  body{font-family:Inter,sans-serif;background:#070707;color:#fff}
  .num{font-variant-numeric:tabular-nums}
</style>
</head>
<body class="grid min-h-screen place-items-center px-6 py-12">

<div class="w-full max-w-[390px]">
  <!-- SWISS MINIMAL: strict grid, hairline rules, generous whitespace, one orange moment -->
  <div class="rounded-[20px] border border-white/[0.07] bg-[#0c0c0c] shadow-[0_30px_80px_-30px_rgba(0,0,0,0.9)]">

    <!-- Header band: index + category, top-aligned to a strict baseline -->
    <div class="flex items-start justify-between px-7 pt-7">
      <div>
        <div class="num text-[11px] font-semibold tracking-[0.2em] text-white/30">GIVEAWAY / 01</div>
        <div class="mt-3 text-[10px] font-semibold uppercase tracking-[0.28em] text-white/45">FiveM · MLO</div>
      </div>
      <div class="text-right">
        <div class="text-[10px] font-semibold uppercase tracking-[0.28em] text-white/30">Entry</div>
        <div class="mt-1 text-[13px] font-semibold tracking-tight text-white">Free</div>
      </div>
    </div>

    <!-- Prize image: clean rectangle, no decoration over it -->
    <div class="mt-6 px-7">
      <div class="overflow-hidden rounded-[10px] border border-white/[0.06]">
        <img src="https://img.forgemods.de/images/thumb/images/4f205008-65c0-4591-9561-33c232a2bc20_gta5map_ls_legion_square_park_bed357ad-959c-4e1e-9420-c793a2ad905f.webp" class="h-40 w-full object-cover" />
      </div>
    </div>

    <!-- Prize title block -->
    <div class="px-7 pt-6">
      <div class="text-[10px] font-semibold uppercase tracking-[0.28em] text-white/40">The prize</div>
      <h1 class="mt-2.5 text-[26px] font-extrabold leading-[1.08] tracking-tight">LS Legion<br/>Square Park</h1>
    </div>

    <!-- Hairline -->
    <div class="mt-7 h-px w-full bg-white/[0.07]"></div>

    <!-- Specs grid: two columns, strict alignment, label / value -->
    <div class="grid grid-cols-2">
      <div class="border-r border-white/[0.07] px-7 py-6">
        <div class="text-[10px] font-semibold uppercase tracking-[0.24em] text-white/40">Worth</div>
        <div class="num mt-2 text-[28px] font-extrabold leading-none tracking-tight">$19.99</div>
      </div>
      <div class="px-7 py-6">
        <div class="text-[10px] font-semibold uppercase tracking-[0.24em] text-white/40">Ends in</div>
        <div class="num mt-2 text-[28px] font-extrabold leading-none tracking-tight">4d 23h</div>
        <div class="num mt-2 text-[11px] font-medium tracking-tight text-white/35">33m remaining</div>
      </div>
    </div>

    <!-- Hairline -->
    <div class="h-px w-full bg-white/[0.07]"></div>

    <!-- Timeline row: dates, strictly aligned -->
    <div class="num flex items-center justify-between px-7 py-5 text-[11px] font-medium tracking-[0.06em] text-white/40">
      <span>JUN 19, 2026</span>
      <span class="h-px w-16 bg-white/15"></span>
      <span>JUN 24, 2026</span>
    </div>

    <!-- Hairline -->
    <div class="h-px w-full bg-white/[0.07]"></div>

    <!-- The single orange moment: the CTA -->
    <div class="px-7 py-7">
      <button class="group flex w-full items-center justify-between rounded-[12px] bg-brand-orange px-6 py-4 text-[15px] font-bold tracking-tight text-black transition hover:bg-orange-400">
        <span>Enter Giveaway</span>
        <i data-lucide="arrow-right" class="h-[18px] w-[18px] transition-transform group-hover:translate-x-1"></i>
      </button>
      <p class="num mt-4 text-center text-[12px] tracking-tight text-white/35">
        Winner drawn automatically &amp; fairly · <span class="font-semibold text-white/55">1,277 entered</span>, you haven't yet
      </p>
    </div>

    <!-- Hairline -->
    <div class="h-px w-full bg-white/[0.07]"></div>

    <!-- Host footer: minimal, no avatar gradient circus -->
    <div class="flex items-center justify-between px-7 py-5">
      <div>
        <div class="text-[10px] font-semibold uppercase tracking-[0.24em] text-white/30">Hosted by</div>
        <div class="mt-1.5 flex items-center gap-1.5 text-[14px] font-semibold tracking-tight">
          Forge Studios <i data-lucide="badge-check" class="h-[15px] w-[15px] text-brand-orange"></i>
        </div>
      </div>
      <button class="text-[12px] font-semibold tracking-tight text-white/45 transition hover:text-white">View →</button>
    </div>
  </div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
