<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveCrux — Marketplace</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      colors: { brand: { orange: '#f97316', yellow: '#facc15' } }
    }
  }
}
</script>
<style>
  body{font-family:'Inter',sans-serif;background:#0a0a0a}
  .glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(12px)}
  .glass-strong{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);backdrop-filter:blur(16px)}
  .orange-glow{box-shadow:0 0 0 1px rgba(249,115,22,0.5),0 8px 32px rgba(249,115,22,0.35)}
  .card-hover{transition:all .25s ease}.card-hover:hover{transform:translateY(-5px);border-color:rgba(249,115,22,0.35);box-shadow:0 16px 48px rgba(0,0,0,0.5)}
  .row-scroll{overflow-x:auto;scrollbar-width:none}.row-scroll::-webkit-scrollbar{display:none}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:#0a0a0a}
  ::-webkit-scrollbar-thumb{background:#27272a;border-radius:8px;border:2px solid #0a0a0a}
  ::-webkit-scrollbar-thumb:hover{background:#f97316}
  .slug-text{font-weight:900;letter-spacing:.08em;text-transform:uppercase;opacity:.10}
</style>
</head>
<body class="text-white">

<!-- ===== NAVBAR ===== -->
<header class="sticky top-0 z-50 glass-strong">
  <div class="max-w-[1500px] mx-auto px-5 h-[68px] flex items-center gap-5">
    <a href="#" class="text-2xl font-black tracking-tight shrink-0">
      <span class="text-brand-orange">Five</span><span class="text-brand-yellow">Crux</span>
    </a>
    <!-- integrated wide search -->
    <div class="flex-1 max-w-2xl mx-auto hidden md:block">
      <div class="glass rounded-xl flex items-center px-4 h-11 focus-within:border-brand-orange/50 transition">
        <i data-lucide="search" class="w-4 h-4 text-white/40"></i>
        <input type="text" placeholder="Search scripts, MLOs, vehicles, weapons…"
          class="bg-transparent outline-none px-3 text-sm w-full placeholder:text-white/40">
        <kbd class="hidden lg:inline-block text-[11px] text-white/40 glass px-1.5 py-0.5 rounded">/</kbd>
      </div>
    </div>
    <div class="flex items-center gap-3 shrink-0 ml-auto">
      <button class="relative w-10 h-10 glass rounded-xl grid place-items-center hover:border-brand-orange/40 transition">
        <i data-lucide="shopping-cart" class="w-4.5 h-4.5"></i>
        <span class="absolute -top-1.5 -right-1.5 bg-brand-orange text-black text-[10px] font-bold w-5 h-5 rounded-full grid place-items-center">2</span>
      </button>
      <button class="hidden sm:flex items-center gap-2 bg-brand-orange text-black font-bold text-sm px-4 h-10 rounded-xl hover:brightness-110 transition">
        <i data-lucide="upload" class="w-4 h-4"></i> Start Selling
      </button>
      <button class="glass rounded-xl text-sm font-semibold px-4 h-10 hover:border-white/20 transition">Login</button>
    </div>
  </div>
</header>

<!-- ===== FEATURED SPOTLIGHT HERO ===== -->
<section class="relative w-full" style="height:65vh;min-height:440px">
  <!-- big gradient cover -->
  <div class="absolute inset-0 bg-gradient-to-br from-orange-600 via-rose-700 to-purple-900 overflow-hidden">
    <div class="absolute inset-0 grid place-items-center select-none">
      <span class="slug-text text-[16vw] text-white">CASINO HEIST</span>
    </div>
  </div>
  <!-- dark overlay -->
  <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/55 to-transparent"></div>
  <div class="absolute inset-0 bg-gradient-to-r from-[#0a0a0a]/85 via-transparent to-transparent"></div>

  <!-- arrows -->
  <button class="absolute left-4 top-1/2 -translate-y-1/2 z-20 w-11 h-11 glass-strong rounded-full grid place-items-center hover:border-brand-orange/50 transition">
    <i data-lucide="chevron-left" class="w-5 h-5"></i>
  </button>
  <button class="absolute right-4 top-1/2 -translate-y-1/2 z-20 w-11 h-11 glass-strong rounded-full grid place-items-center hover:border-brand-orange/50 transition">
    <i data-lucide="chevron-right" class="w-5 h-5"></i>
  </button>

  <!-- content bottom-left -->
  <div class="absolute bottom-0 left-0 right-0 z-10">
    <div class="max-w-[1500px] mx-auto px-5 pb-8 flex flex-col lg:flex-row lg:items-end justify-between gap-6">
      <div class="max-w-2xl">
        <span class="inline-flex items-center gap-1.5 bg-brand-orange text-black text-xs font-bold px-2.5 py-1 rounded-full mb-3">
          <i data-lucide="star" class="w-3.5 h-3.5"></i> FEATURED
        </span>
        <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-3">Casino Heist Script</h1>
        <div class="flex flex-wrap items-center gap-2 mb-3">
          <span class="glass text-xs font-semibold px-2.5 py-1 rounded-md">ESX</span>
          <span class="flex items-center gap-1 text-sm font-semibold"><i data-lucide="star" class="w-4 h-4 fill-brand-yellow text-brand-yellow"></i> 5.0</span>
          <span class="text-white/50 text-sm">by HighRoller</span>
        </div>
        <p class="text-white/70 text-sm md:text-base mb-5 max-w-xl">A fully synced, multi-stage casino heist with hacking minigames, loot tables, and police escalation.</p>
        <div class="flex items-center gap-4">
          <span class="text-3xl font-black text-brand-yellow">$39.99</span>
          <div class="flex gap-3">
            <button class="flex items-center gap-2 bg-brand-orange text-black font-bold px-5 h-12 rounded-xl orange-glow hover:brightness-110 transition">
              <i data-lucide="eye" class="w-4.5 h-4.5"></i> View Script
            </button>
            <button class="flex items-center gap-2 glass-strong font-semibold px-5 h-12 rounded-xl hover:border-brand-orange/40 transition">
              <i data-lucide="shopping-cart" class="w-4.5 h-4.5"></i> Add to Cart
            </button>
          </div>
        </div>
      </div>
      <!-- thumbnail switchers + dots -->
      <div class="flex flex-col items-end gap-3">
        <div class="flex gap-2.5">
          <div class="w-24 h-14 rounded-lg bg-gradient-to-br from-orange-600 to-rose-700 ring-2 ring-brand-orange cursor-pointer"></div>
          <div class="w-24 h-14 rounded-lg bg-gradient-to-br from-sky-600 to-indigo-800 ring-1 ring-white/10 opacity-70 hover:opacity-100 cursor-pointer transition"></div>
          <div class="w-24 h-14 rounded-lg bg-gradient-to-br from-emerald-600 to-teal-800 ring-1 ring-white/10 opacity-70 hover:opacity-100 cursor-pointer transition"></div>
          <div class="w-24 h-14 rounded-lg bg-gradient-to-br from-fuchsia-600 to-purple-800 ring-1 ring-white/10 opacity-70 hover:opacity-100 cursor-pointer transition"></div>
          <div class="w-24 h-14 rounded-lg bg-gradient-to-br from-amber-500 to-red-700 ring-1 ring-white/10 opacity-70 hover:opacity-100 cursor-pointer transition hidden xl:block"></div>
        </div>
        <div class="flex gap-1.5">
          <span class="w-6 h-1.5 rounded-full bg-brand-orange"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-white/30"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-white/30"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-white/30"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-white/30"></span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ===== CATEGORY PILLS ===== -->
<section class="max-w-[1500px] mx-auto px-5 py-6">
  <div class="row-scroll flex gap-2.5">
    <button class="shrink-0 bg-brand-orange text-black font-semibold text-sm px-4 h-9 rounded-full">All</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Scripts</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Props</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">MLOs</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Vehicles</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Weapons</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Clothing</button>
    <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Giveaways</button>
  </div>
</section>

<!-- ===== HORIZONTAL ROWS ===== -->
<div id="rows" class="max-w-[1500px] mx-auto px-5 space-y-10 pb-4"></div>

<!-- ===== TABBED DENSE GRID ===== -->
<section class="max-w-[1500px] mx-auto px-5 py-10">
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <h2 class="text-2xl font-black">Browse Everything</h2>
    <div class="flex flex-wrap items-center gap-3">
      <div class="row-scroll flex gap-2">
        <button class="shrink-0 bg-brand-orange text-black font-semibold text-sm px-4 h-9 rounded-full">All</button>
        <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Scripts</button>
        <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">MLOs</button>
        <button class="shrink-0 glass font-medium text-sm px-4 h-9 rounded-full hover:border-brand-orange/40 transition">Vehicles</button>
      </div>
      <button class="flex items-center gap-2 glass font-medium text-sm px-4 h-9 rounded-xl hover:border-white/20 transition">
        <i data-lucide="arrow-up-down" class="w-4 h-4 text-white/50"></i> Sort: Popular
        <i data-lucide="chevron-down" class="w-4 h-4 text-white/50"></i>
      </button>
    </div>
  </div>
  <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div>
  <div class="flex justify-center mt-8">
    <button class="glass-strong font-semibold text-sm px-7 h-11 rounded-xl hover:border-brand-orange/40 transition flex items-center gap-2">
      <i data-lucide="plus" class="w-4 h-4"></i> Load more
    </button>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer class="border-t border-white/10 mt-6">
  <div class="max-w-[1500px] mx-auto px-5 py-8 flex flex-col md:flex-row items-center justify-between gap-5">
    <a href="#" class="text-xl font-black tracking-tight">
      <span class="text-brand-orange">Five</span><span class="text-brand-yellow">Crux</span>
    </a>
    <nav class="flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-sm text-white/60">
      <a href="#" class="hover:text-white transition">Scripts</a>
      <a href="#" class="hover:text-white transition">Props</a>
      <a href="#" class="hover:text-white transition">Giveaways</a>
      <a href="#" class="hover:text-white transition">Advertise</a>
      <a href="#" class="hover:text-white transition flex items-center gap-1.5"><i data-lucide="message-circle" class="w-4 h-4"></i> Discord</a>
    </nav>
    <p class="text-sm text-white/40">© 2026 FiveCrux</p>
  </div>
</footer>

<script>
// ===== DATA =====
const products = [
  {t:'Advanced Banking System', fw:['ESX','QBCore'], price:19.99, was:30, rating:4.9, seller:'CruxDev', tag:'FEATURED', grad:'from-emerald-600 to-teal-800', slug:'BANK'},
  {t:'Police MDT & Dispatch', fw:['QBCore'], price:24.99, rating:5.0, seller:'NightShift', grad:'from-sky-600 to-indigo-800', slug:'MDT'},
  {t:'Inventory HUD Reloaded', fw:['ESX','Standalone'], price:0, rating:4.7, seller:'PixelForge', tag:'FREE', grad:'from-fuchsia-600 to-purple-800', slug:'HUD'},
  {t:'Luxury Apartments MLO', fw:['Standalone'], price:34.99, rating:4.8, seller:'MapMasters', grad:'from-amber-500 to-orange-700', slug:'APTS'},
  {t:'Drift Car Pack (15)', fw:['Standalone'], price:14.99, rating:4.6, seller:'RevHead', grad:'from-rose-600 to-red-800', slug:'DRIFT'},
  {t:'Advanced Garage', fw:['QBCore'], price:12.99, rating:4.5, seller:'GarageGuru', grad:'from-cyan-600 to-blue-800', slug:'GARAGE'},
  {t:'Hospital Interior MLO', fw:['Standalone'], price:29.99, rating:4.9, seller:'MapMasters', tag:'FEATURED', grad:'from-teal-500 to-emerald-800', slug:'HOSP'},
  {t:'Phone System v2', fw:['ESX','QBCore'], price:22.50, rating:4.8, seller:'ConnectDev', grad:'from-violet-600 to-indigo-900', slug:'PHONE'},
  {t:'Weapon Pack Tactical', fw:['Standalone'], price:9.99, rating:4.4, seller:'Armory', grad:'from-zinc-600 to-slate-800', slug:'AMMO'},
  {t:'Job Center Reworked', fw:['QBCore'], price:0, rating:4.6, seller:'WorkForce', tag:'FREE', grad:'from-lime-600 to-green-800', slug:'JOBS'},
  {t:'Casino Heist Script', fw:['ESX'], price:39.99, rating:5.0, seller:'HighRoller', tag:'FEATURED', grad:'from-orange-600 to-rose-800', slug:'HEIST'},
  {t:'Custom Clothing Pack', fw:['Standalone'], price:7.99, rating:4.3, seller:'ThreadCo', grad:'from-pink-600 to-fuchsia-800', slug:'WEAR'},
];

function priceHTML(p){
  if(p.price===0) return `<span class="text-green-400 font-bold text-base">Free</span>`;
  let html = `<span class="text-brand-yellow font-bold text-base">$${p.price.toFixed(2)}</span>`;
  if(p.was) html += ` <span class="text-white/40 line-through text-xs">$${p.was.toFixed(2)}</span>`;
  return html;
}

function cornerTag(p){
  if(p.tag==='FEATURED') return `<span class="absolute top-2.5 left-2.5 z-10 bg-brand-orange text-black text-[10px] font-bold px-2 py-0.5 rounded-md flex items-center gap-1"><i data-lucide="star" class="w-3 h-3"></i>FEATURED</span>`;
  if(p.tag==='FREE') return `<span class="absolute top-2.5 left-2.5 z-10 bg-green-500 text-black text-[10px] font-bold px-2 py-0.5 rounded-md">FREE</span>`;
  return '';
}

function discountBadge(p){
  if(!p.was) return '';
  const pct = Math.round((1 - p.price/p.was)*100);
  return `<span class="absolute top-2.5 right-2.5 z-10 bg-red-500 text-white text-[11px] font-bold px-2 py-0.5 rounded-md">-${pct}%</span>`;
}

function fwBadges(p){
  return p.fw.map(f=>`<span class="glass text-[10px] font-semibold px-1.5 py-0.5 rounded">${f}</span>`).join('');
}

function card(p, opts={}){
  const w = opts.row ? 'w-[280px] flex-shrink-0' : 'w-full';
  return `
  <div class="${w} glass rounded-2xl card-hover overflow-hidden cursor-pointer">
    <div class="relative h-40 bg-gradient-to-br ${p.grad} grid place-items-center overflow-hidden">
      ${cornerTag(p)}
      ${opts.discount ? discountBadge(p) : ''}
      <span class="slug-text text-4xl text-white">${p.slug}</span>
    </div>
    <div class="p-4">
      <div class="flex gap-1.5 mb-2">${fwBadges(p)}</div>
      <h3 class="font-bold text-sm mb-2 leading-snug truncate">${p.t}</h3>
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-1.5">
          <span class="w-5 h-5 rounded-full bg-gradient-to-br ${p.grad} ring-1 ring-white/20 grid place-items-center text-[9px] font-bold">${p.seller[0]}</span>
          <span class="text-xs text-white/60">${p.seller}</span>
        </div>
        <span class="flex items-center gap-1 text-xs font-semibold"><i data-lucide="star" class="w-3.5 h-3.5 fill-brand-yellow text-brand-yellow"></i>${p.rating}</span>
      </div>
      <div class="flex items-center justify-between">
        <div>${priceHTML(p)}</div>
        <button class="w-8 h-8 glass rounded-lg grid place-items-center hover:bg-brand-orange hover:text-black transition">
          <i data-lucide="plus" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  </div>`;
}

function rowSection(title, items, discount){
  return `
  <div>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-black">${title}</h2>
      <a href="#" class="text-sm font-semibold text-brand-orange flex items-center gap-1 hover:gap-2 transition-all">See all <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
    </div>
    <div class="row-scroll flex gap-5 pb-2">
      ${items.map(p=>card(p,{row:true,discount})).join('')}
    </div>
  </div>`;
}

// ON SALE: synthesize discounts
const onSale = [
  {...products[0]},
  {...products[3], was:50},
  {...products[7], was:32},
  {...products[4], was:22},
  {...products[5], was:20},
  {...products[8], was:16},
];

const rows = [
  rowSection('Trending This Week', [products[10],products[1],products[6],products[7],products[0],products[3]], false),
  rowSection('New Releases', [products[5],products[11],products[8],products[2],products[9],products[4]], false),
  rowSection('On Sale', onSale, true),
];
document.getElementById('rows').innerHTML = rows.join('');

// DENSE GRID: 16 cards
const gridItems = [...products, products[0], products[6], products[10], products[3]];
document.getElementById('grid').innerHTML = gridItems.map(p=>card(p,{})).join('');

lucide.createIcons();
</script>
</body>
</html>
